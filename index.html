const sb = async (path, opts={}) => {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {

function Wheel({spinning,onEnd}){
  const ref=useRef();
  const st=useRef({angle:0,vel:0,going:false,done:false});
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d"),cx=c.width/2,cy=c.height/2,r=cx-10;
    const draw=a=>{
      ctx.clearRect(0,0,c.width,c.height);
      const sl=(2*Math.PI)/CATS.length;
      CATS.forEach((cat,i)=>{
        const s=a+i*sl,e=s+sl;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);
        ctx.fillStyle=cat.color;ctx.fill();
        ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
        ctx.save();ctx.translate(cx,cy);ctx.rotate(s+sl/2);
        ctx.textAlign="right";ctx.font="bold 11px system-ui";
        ctx.fillStyle="#1a1a2e";
        ctx.fillText(cat.emoji+" "+cat.label,r-12,4);
        ctx.restore();
      });
      ctx.beginPath();ctx.arc(cx,cy,18,0,2*Math.PI);
      ctx.fillStyle="#fff";ctx.fill();
    };
    let raf;
    const tick=()=>{
      if(st.current.going){
        st.current.angle+=st.current.vel;
        st.current.vel*=0.985;
        draw(st.current.angle);
        if(st.current.vel<0.002&&!st.current.done){
          st.current.going=false;st.current.done=true;
          const sl=(2*Math.PI)/CATS.length;
          const n=((-st.current.angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
          onEnd(CATS[Math.floor(n/sl)%CATS.length]);return;
        }
      }
      raf=requestAnimationFrame(tick);
    };
    draw(st.current.angle);
    if(spinning&&!st.current.going){
      st.current.vel=0.25+Math.random()*0.15;
      st.current.going=true;st.current.done=false;
      tick();
    }
    return()=>cancelAnimationFrame(raf);
  },[spinning]);
  return(
    <div style={{position:"relative",display:"inline-block"}}>
      <div style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",fontSize:28,zIndex:10}}>▼</div>
      <canvas ref={ref} width={300} height={300} style={{borderRadius:"50%",boxShadow:"0 0 40px #FF6B9D44"}}/>
    </div>
  );
}

      <nav style={{background:card,borderBottom:`1px solid ${bdr}`,padding:"0 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,position:"sticky",top:0,zIndex:100}}>

                    ):(
                      <div style={{padding:"2rem",textAlign:"center",color:mut,fontSize:13}}>
                        No models yet for this category.<br/>
                        <a href={`https://www.printables.com/search/results?q=${result.label}`} target="_blank" rel="noopener noreferrer" style={{color:acc,marginTop:8,display:"block"}}>Browse on Printables →</a>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"1rem",marginTop:"3rem"}}>
              {[{n:"9",l:"Categories"},{n:"180+",l:"Daily Models"},{n:"5",l:"Free Spins/Day"},{n:"Free",l:"To Join"}].map(s=>(
                <div key={s.l} style={{background:card,border:`1px solid ${bdr}`,borderRadius:12,padding:"1.25rem",textAlign:"center"}}>
                  <div style={{fontSize:26,fontWeight:900,color:acc}}>{s.n}</div>
                  <div style={{color:mut,fontSize:12,marginTop:4}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {page==="categories"&&(
          <div>
            <h2 style={{color:acc,marginBottom:"0.5rem"}}>Browse by Category</h2>
            <p style={{color:mut,marginBottom:"1.5rem"}}>Pick a category and spin for something in that space.</p>
            <div style={{background:`linear-gradient(135deg,#FF6B6B22,#FF6B9D22)`,border:"1px solid #FF6B6B44",borderRadius:16,padding:"2rem",marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem"}}>
              <div>
                <div style={{fontSize:12,color:acc,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>⭐ Featured</div>
                <h3 style={{margin:"0 0 0.5rem",fontSize:24,fontWeight:800}}>🏠 Home & Living</h3>
                <p style={{color:mut,margin:"0 0 1rem",fontSize:14}}>Organizers, planters, gadgets — all printable.</p>
                <button onClick={()=>setPage("home")} style={{background:acc,color:"#fff",border:"none",padding:"0.65rem 1.25rem",borderRadius:10,fontWeight:700,fontSize:13}}>Spin This Category 🎲</button>
              </div>
              <div style={{fontSize:64}}>🏠</div>
            </div>
            {CATS.filter(c=>c.id!=="hall").map((cat,i)=>(
              <div key={cat.id} style={{display:"flex",gap:"1.25rem",alignItems:"center",background:card,border:`1px solid ${bdr}`,borderRadius:14,padding:"1.25rem",marginBottom:"0.75rem",flexDirection:i%2===0?"row":"row-reverse",flexWrap:"wrap"}}>
                <div style={{width:64,height:64,background:cat.color+"22",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{cat.emoji}</div>
                <div style={{flex:1,minWidth:140}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{cat.label}</div>
                  <span style={{background:cat.color+"22",color:cat.color,fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600}}>20 fresh models daily</span>
                </div>
                <button onClick={()=>setPage("home")} style={{background:cat.color+"22",color:cat.color,border:`1px solid ${cat.color}44`,padding:"0.5rem 1rem",borderRadius:10,fontWeight:700,fontSize:12}}>Spin 🎲</button>
              </div>
            ))}
          </div>
        )}

        {page==="hall"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"1rem",marginBottom:"1.5rem"}}>
              <div><h2 style={{color:acc,margin:"0 0 0.5rem"}}>🏆 Hall of Prints</h2><p style={{color:mut}}>Show off your work. Earn +3 spins per submission!</p></div>
              <div style={{background:cy2+"15",border:`1px solid ${cy2}33`,borderRadius:10,padding:"0.75rem 1.25rem",textAlign:"center"}}><div style={{color:cy2,fontWeight:800,fontSize:20}}>+3</div><div style={{color:mut,fontSize:11}}>spins/submission</div></div>
            </div>
            <div style={{background:card,border:`1px solid ${bdr}`,borderRadius:14,padding:"1.25rem",marginBottom:"1.5rem"}}>
              <h3 style={{margin:"0 0 1rem"}}>Submit Your Print</h3>
              <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${bdr}`,borderRadius:10,padding:"1.25rem",textAlign:"center",cursor:"pointer",marginBottom:"1rem",background:bg}}>
                {hForm.prev?<img src={hForm.prev} alt="preview" style={{maxHeight:160,maxWidth:"100%",borderRadius:8}}/>:<div><div style={{fontSize:28,marginBottom:6}}>📷</div><div style={{color:mut,fontSize:13}}>Tap to add photo — mobile & desktop</div></div>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleImg} style={{display:"none"}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.875rem",marginBottom:"0.875rem"}}>
                <div><label style={{fontSize:12,color:mut,display:"block",marginBottom:3}}>Maker Name <span style={{color:acc}}>*</span></label><input style={inp} value={hForm.name} onChange={e=>setHForm(x=>({...x,name:e.target.value}))} placeholder="Your name or handle"/></div>
                <div><label style={{fontSize:12,color:mut,display:"block",marginBottom:3}}>Category</label>
                  <select style={inp} value={hForm.category} onChange={e=>setHForm(x=>({...x,category:e.target.value}))}>
                    {CATS.filter(c=>c.id!=="hall").map(c=><option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{marginBottom:"1rem"}}><label style={{fontSize:12,color:mut,display:"block",marginBottom:3}}>About your print (optional)</label><textarea style={{...inp,resize:"vertical"}} rows={3} value={hForm.desc} onChange={e=>setHForm(x=>({...x,desc:e.target.value}))} placeholder="Filament, printer, tips..."/></div>
              {hDone&&<div style={{background:cy2+"15",border:`1px solid ${cy2}33`,borderRadius:8,padding:"0.75rem",color:cy2,marginBottom:"1rem",fontSize:13}}>✅ Submitted! Pending review. {user?"+3 spins added!":"Sign up to earn spins!"}</div>}
              <button onClick={submitHall} disabled={!hForm.name.trim()||!hForm.prev||load} style={{width:"100%",background:!hForm.name.trim()||!hForm.prev?"#1a1a2e":acc,color:!hForm.name.trim()||!hForm.prev?mut:"#fff",border:"none",padding:"0.85rem",borderRadius:10,fontWeight:700,fontSize:14}}>
                {load?"Submitting...":"Submit & Earn 3 Spins 🏆"}
              </button>
            </div>
            <h3 style={{marginBottom:"1rem"}}>Community Prints ({hall.filter(p=>p.approved).length})</h3>
            <div style={{columns:"2 240px",gap:"0.875rem"}}>
              {hall.filter(p=>p.approved).map(p=>(
                <div key={p.id} style={{background:card,border:`1px solid ${bdr}`,borderRadius:12,overflow:"hidden",marginBottom:"0.875rem",breakInside:"avoid"}}>
                  {p.image_url&&<img src={p.image_url} alt={p.maker_name} style={{width:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{padding:"0.75rem"}}><div style={{fontWeight:700,fontSize:13}}>{p.maker_name}</div>{p.description&&<div style={{color:mut,fontSize:11,marginTop:3}}>{p.description}</div>}</div>
                </div>
              ))}
              {hall.length===0&&<div style={{color:mut,padding:"2rem",textAlign:"center",fontSize:13}}>No approved prints yet — be the first!</div>}
            </div>
          </div>
        )}

        {page==="earn"&&(
          <div>
            <h2 style={{color:acc,marginBottom:"0.5rem"}}>⚡ Earn More Spins</h2>
            <p style={{color:mut,marginBottom:"1.5rem"}}>Complete actions or unlock unlimited access.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:"1rem",marginBottom:"2rem"}}>
              {[{a:"hall",l:"Submit to Hall of Prints",s:3,i:"📸"},{a:"refer",l:"Refer a Friend",s:5,i:"👥"},{a:"streak",l:"7-Day Login Streak",s:5,i:"🔥"},{a:"share",l:"Share on Social Media",s:2,i:"📱"}].map(a=>(
                <div key={a.a} style={{background:card,border:`1px solid ${bdr}`,borderRadius:14,padding:"1.25rem"}}>
                  <div style={{fontSize:28,marginBottom:10}}>{a.i}</div>
                  <div style={{fontWeight:700,marginBottom:5,fontSize:14}}>{a.l}</div>
                  <div style={{color:acc,fontWeight:800,fontSize:18,marginBottom:"0.875rem"}}>+{a.s} spins</div>
                  <button onClick={()=>a.a==="hall"&&setPage("hall")} style={{width:"100%",background:acc+"22",color:acc,border:`1px solid ${acc}44`,padding:"0.6rem",borderRadius:8,fontWeight:600,fontSize:12}}>
                    {a.a==="hall"?"Submit Now →":"Coming Soon"}
                  </button>
                </div>
              ))}
            </div>
            <h3 style={{marginBottom:"1rem"}}>💎 Buy Spins</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"1rem"}}>
              {[{l:"Starter Pack",s:"10",p:"$1.99",c:"#4ECDC4"},{l:"Power Pack",s:"50",p:"$4.99",c:acc,f:true},{l:"Lifetime Unlimited",s:"∞",p:"$99",c:"#7b2fff"}].map(p=>(
                <div key={p.l} style={{background:card,border:`2px solid ${p.f?p.c:bdr}`,borderRadius:14,padding:"1.25rem",textAlign:"center",position:"relative"}}>
                  {p.f&&<div style={{position:"absolute",top:-11,left:"50%",transform:"translateX(-50%)",background:acc,color:"#fff",fontSize:10,padding:"2px 10px",borderRadius:20,fontWeight:700,whiteSpace:"nowrap"}}>POPULAR</div>}
                  <div style={{fontSize:26,fontWeight:900,color:p.c,marginBottom:3}}>{p.s}</div>
                  <div style={{fontSize:11,color:mut,marginBottom:6}}>{p.s==="∞"?"spins forever":"spins"}</div>
                  <div style={{fontWeight:700,marginBottom:3,fontSize:13}}>{p.l}</div>
                  <div style={{fontSize:20,fontWeight:900,color:p.c,marginBottom:"0.875rem"}}>{p.p}</div>
                  <button style={{width:"100%",background:p.c,color:"#fff",border:"none",padding:"0.6rem",borderRadius:8,fontWeight:700,fontSize:13}}>Buy Now</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {page==="beginners"&&(
          <div>
            <h2 style={{color:acc,marginBottom:"0.5rem"}}>🎓 Beginner's Guide</h2>
            <p style={{color:mut,marginBottom:"1.5rem"}}>Never printed before? Start here. No jargon.</p>
            {[
              {q:"What is 3D printing?",a:"A process where a digital design is turned into a physical object by layering material one thin slice at a time. Think LEGO — but automated and precise."},
              {q:"What materials do I need?",a:"Start with PLA filament — beginner-friendly, affordable, and comes in hundreds of colors. Works on almost every printer."},
              {q:"What printer should I buy?",a:"The Bambu Lab A1 Mini is easiest for beginners — fast and automated. The Creality Ender 3 is cheaper but requires more tinkering."},
              {q:"Where do I find free models?",a:"Printables.com (by Prusa), MakerWorld.com (by Bambu), and Thingiverse.com are the biggest free libraries. Millions of free designs between them."},
              {q:"What is slicing software?",a:"Software that converts your 3D model file into printer instructions. Bambu Studio and Cura are the most popular free options."},
              {q:"How long does a print take?",a:"20 minutes for small objects up to 24+ hours for large detailed models. Modern Bambu Lab printers run 5–10x faster than older machines."},
            ].map((item,i)=>(
              <div key={i} style={{background:card,border:`1px solid ${bdr}`,borderRadius:12,marginBottom:"0.75rem",overflow:"hidden"}}>
                <button onClick={()=>setFaq(faq===i?null:i)} style={{width:"100%",background:"transparent",border:"none",padding:"1rem 1.25rem",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",color:txt,fontSize:14,fontWeight:600}}>
                  <span>{item.q}</span>
                  <span style={{color:acc,fontSize:20,transform:faq===i?"rotate(45deg)":"none",transition:"0.2s",flexShrink:0}}>+</span>
                </button>
                {faq===i&&<div style={{padding:"0 1.25rem 1rem",color:mut,fontSize:13,lineHeight:1.8}}>{item.a}</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      {showBuy&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"1rem"}}>
          <div style={{background:card,border:`1px solid ${bdr}`,borderRadius:16,padding:"2rem",maxWidth:380,width:"100%"}}>
            <h3 style={{margin:"0 0 1.5rem",color:acc}}>💎 Get More Spins</h3>
            {[{l:"10 Spins",p:"$1.99"},{l:"50 Spins",p:"$4.99"},{l:"Lifetime Unlimited",p:"$99"}].map(p=>(
              <div key={p.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:bg,border:`1px solid ${bdr}`,borderRadius:10,padding:"0.875rem",marginBottom:"0.75rem"}}>
                <span style={{fontWeight:600,fontSize:14}}>{p.l}</span>
                <div style={{display:"flex",gap:"0.75rem",alignItems:"center"}}>
                  <span style={{color:acc,fontWeight:800}}>{p.p}</span>
                  <button style={{background:acc,color:"#fff",border:"none",padding:"5px 12px",borderRadius:8,fontWeight:700,fontSize:12}}>Buy</button>
                </div>
              </div>
            ))}
            <button onClick={()=>setShowBuy(false)} style={{width:"100%",background:"transparent",border:`1px solid ${bdr}`,color:mut,padding:"0.75rem",borderRadius:10,marginTop:"0.5rem"}}>Cancel</button>
          </div>
        </div>
      )}

      {adminOpen&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"1rem"}}>
          <div style={{background:card,border:`1px solid ${bdr}`,borderRadius:16,padding:"2rem",width:"100%",maxWidth:500,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
              <h3 style={{margin:0,color:"#a78bfa"}}>🔐 Admin Panel</h3>
              <button onClick={()=>{setAdminOpen(false);setAdminAuth(false);setAdminPw("");}} style={{background:"transparent",border:"none",color:mut,fontSize:20}}>✕</button>
            </div>
            {!adminAuth?(
              <div>
                <input type="password" style={{...inp,marginBottom:12}} value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(adminPw==="Rotech!789"?setAdminAuth(true):null)} placeholder="Admin password"/>
                <button onClick={()=>adminPw==="Rotech!789"?setAdminAuth(true):showToast("Wrong password.","#ef4444")} style={{width:"100%",background:"#7b2fff",color:"#fff",border:"none",padding:"0.75rem",borderRadius:10,fontWeight:700}}>Login</button>
              </div>
            ):(
              <div>
                <div style={{display:"flex",gap:"1rem",marginBottom:"1.25rem"}}>
                  <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:10,padding:"0.875rem",flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:"#22c55e"}}>{hall.length}</div><div style={{color:mut,fontSize:11}}>Approved</div></div>
                </div>
                <button onClick={loadHall} style={{background:cy2+"22",color:cy2,border:`1px solid ${cy2}33`,padding:"0.5rem 1rem",borderRadius:8,fontSize:12,marginBottom:"1rem"}}>🔄 Refresh</button>
                <h4 style={{color:"#f59e0b",margin:"0 0 0.875rem"}}>⏳ Pending Approval ({hall.filter(p=>!p.approved).length})</h4>
                {hall.filter(p=>!p.approved).length===0&&<div style={{color:mut,fontSize:13,marginBottom:"1rem"}}>No pending submissions.</div>}
                {hall.filter(p=>!p.approved).map(p=>(
                  <div key={p.id} style={{background:bg,border:`1px solid #f59e0b44`,borderRadius:10,padding:"0.75rem 1rem",marginBottom:"0.5rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:13}}>{p.maker_name}</div>
                        {p.description&&<div style={{color:mut,fontSize:11,marginTop:2}}>{p.description}</div>}
                      </div>
                      {p.image_url&&<img src={p.image_url} alt="" style={{width:50,height:50,objectFit:"cover",borderRadius:6,flexShrink:0}}/>}
                    </div>
                    <div style={{display:"flex",gap:"0.5rem",marginTop:"0.75rem"}}>
                      <button onClick={async()=>{try{await sb(`hall_of_prints?id=eq.${p.id}`,{method:"PATCH",body:JSON.stringify({approved:true})});loadHall();showToast("Approved! ✅");}catch{showToast("Error.","#ef4444");}}} style={{flex:1,background:"#00ff8822",border:"1px solid #00ff8844",color:"#00ff88",padding:"0.4rem",borderRadius:8,fontWeight:600,fontSize:12}}>✅ Approve</button>
                      <button onClick={async()=>{try{await sb(`hall_of_prints?id=eq.${p.id}`,{method:"DELETE"});loadHall();showToast("Deleted.","#a0a0c0");}catch{showToast("Error.","#ef4444");}}} style={{flex:1,background:"#ef444422",border:"1px solid #ef444444",color:"#ef4444",padding:"0.4rem",borderRadius:8,fontWeight:600,fontSize:12}}>🗑️ Delete</button>
                    </div>
                  </div>
                ))}
                <h4 style={{color:"#22c55e",margin:"1rem 0 0.875rem"}}>✅ Approved ({hall.filter(p=>p.approved).length})</h4>
                {hall.filter(p=>p.approved).length===0&&<div style={{color:mut,fontSize:13}}>No approved posts yet.</div>}
                {hall.filter(p=>p.approved).map(p=>(
                  <div key={p.id} style={{background:bg,border:`1px solid ${bdr}`,borderRadius:10,padding:"0.75rem 1rem",marginBottom:"0.5rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"0.5rem"}}>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13}}>{p.maker_name}</div>{p.description&&<div style={{color:mut,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>}</div>
                    <button onClick={async()=>{try{await sb(`hall_of_prints?id=eq.${p.id}`,{method:"DELETE"});loadHall();showToast("Removed.","#a0a0c0");}catch{showToast("Error.","#ef4444");}}} style={{background:"#ef444422",border:"1px solid #ef444444",color:"#ef4444",padding:"0.25rem 0.75rem",borderRadius:8,fontSize:11,flexShrink:0}}>Remove</button>
                  </div>
                ))}
                {hall.length===0&&<div style={{color:mut,fontSize:13}}>No approved posts yet.</div>}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
