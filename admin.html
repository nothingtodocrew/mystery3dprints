<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mystery3DPrints Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:system-ui,sans-serif;padding:2rem 1rem}
h1{color:#FF6B9D;margin-bottom:0.5rem}
h2{color:#e8e8f0;margin:1.5rem 0 1rem;font-size:16px}
.card{background:#13131f;border:1px solid #2a2a3d;border-radius:12px;padding:1rem;margin-bottom:0.75rem}
.pending{border-color:#f59e0b44}
.approved{border-color:#22c55e44}
img{width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0}
.row{display:flex;gap:1rem;align-items:flex-start}
.info{flex:1}
.name{font-weight:700;font-size:14px}
.desc{color:#7070a0;font-size:12px;margin-top:3px}
.btns{display:flex;gap:0.5rem;margin-top:0.75rem}
button{padding:0.4rem 1rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:12px}
.approve{background:#00ff8822;border:1px solid #00ff8844;color:#00ff88}
.reject{background:#ef444422;border:1px solid #ef444444;color:#ef4444}
.login-box{max-width:300px;margin:4rem auto;background:#13131f;border:1px solid #2a2a3d;border-radius:16px;padding:2rem}
input{width:100%;background:#0d0d14;border:1px solid #2a2a3d;border-radius:8px;padding:0.65rem;color:#e8e8f0;font-size:14px;margin-bottom:1rem}
.login-btn{width:100%;background:#FF6B9D;color:#fff;border:none;padding:0.85rem;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.pending-badge{background:#f59e0b22;color:#f59e0b}
.approved-badge{background:#22c55e22;color:#22c55e}
.err{color:#ef4444;font-size:13px;margin-bottom:1rem}
.stats{display:flex;gap:1rem;margin-bottom:1.5rem}
.stat{background:#13131f;border:1px solid #2a2a3d;border-radius:10px;padding:1rem;flex:1;text-align:center}
.stat-n{font-size:24px;font-weight:900;color:#FF6B9D}
.stat-l{color:#7070a0;font-size:12px;margin-top:4px}
.refresh{background:#00f5ff22;border:1px solid #00f5ff44;color:#00f5ff;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:1rem}
</style>
</head>
<body>

<div id="login" class="login-box">
  <h1 style="text-align:center;margin-bottom:0.5rem">🔐 Admin</h1>
  <p style="text-align:center;color:#7070a0;font-size:14px;margin-bottom:1.5rem">Mystery3DPrints</p>
  <div id="login-err" class="err" style="display:none"></div>
  <input type="password" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="login-btn" onclick="doLogin()">Login</button>
</div>

<div id="dashboard" style="display:none;max-width:700px;margin:0 auto">
  <h1>🖨️ Mystery3DPrints Admin</h1>
  <p style="color:#7070a0;font-size:14px;margin-bottom:1.5rem">Manage Hall of Prints submissions</p>
  
  <div class="stats">
    <div class="stat"><div class="stat-n" id="pending-count">—</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="approved-count">—</div><div class="stat-l">Approved</div></div>
    <div class="stat"><div class="stat-n" id="total-count">—</div><div class="stat-l">Total</div></div>
  </div>

  <button class="refresh" onclick="loadAll()">🔄 Refresh</button>

  <h2>⏳ Pending Approval</h2>
  <div id="pending-list"><p style="color:#7070a0;font-size:14px">Loading...</p></div>

  <h2>✅ Approved Posts</h2>
  <div id="approved-list"><p style="color:#7070a0;font-size:14px">Loading...</p></div>
</div>

<script>
const SB = "https://kmlemcoibfiziuiockfn.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbGVtY29pYmZpeml1aW9ja2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTU3NDMsImV4cCI6MjA5NTk5MTc0M30.WHhFFXz5YlS1Kzp-PgZV5vV83igkYx0ysHuo72RNDsc";

const sb = async (path, opts={}) => {
  const res = await fetch(`${SB}/rest/v1/${path}`, {
    headers: {apikey:KEY, Authorization:`Bearer ${KEY}`, "Content-Type":"application/json", Prefer:"return=representation", ...opts.headers},
    ...opts
  });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

function doLogin() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('login-err');
  if (pw === 'Rotech!789') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    err.textContent = 'Incorrect password.';
    err.style.display = 'block';
  }
}

async function loadAll() {
  try {
    const data = await sb("hall_of_prints?order=created_at.desc");
    const pending = data.filter(p => !p.approved);
    const approved = data.filter(p => p.approved);
    
    document.getElementById('pending-count').textContent = pending.length;
    document.getElementById('approved-count').textContent = approved.length;
    document.getElementById('total-count').textContent = data.length;

    renderList('pending-list', pending, true);
    renderList('approved-list', approved, false);
  } catch(e) {
    document.getElementById('pending-list').innerHTML = `<p style="color:#ef4444">Error loading data: ${e.message}</p>`;
  }
}

function renderList(containerId, items, isPending) {
  const el = document.getElementById(containerId);
  if (items.length === 0) {
    el.innerHTML = `<p style="color:#7070a0;font-size:14px">${isPending ? 'No pending submissions.' : 'No approved posts yet.'}</p>`;
    return;
  }
  el.innerHTML = items.map(p => `
    <div class="card ${isPending ? 'pending' : 'approved'}">
      <div class="row">
        ${p.image_url ? `<img src="${p.image_url}" onerror="this.style.display='none'"/>` : ''}
        <div class="info">
          <div class="name">${p.maker_name} <span class="badge ${isPending ? 'pending-badge' : 'approved-badge'}">${isPending ? 'Pending' : 'Approved'}</span></div>
          ${p.description ? `<div class="desc">${p.description}</div>` : ''}
          <div class="desc" style="margin-top:4px">Category: ${p.category || 'N/A'} • ${new Date(p.created_at).toLocaleDateString()}</div>
        </div>
      </div>
      <div class="btns">
        ${isPending ? `<button class="approve" onclick="approvePost('${p.id}')">✅ Approve</button>` : ''}
        <button class="reject" onclick="deletePost('${p.id}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('');
}

async function approvePost(id) {
  try {
    await sb(`hall_of_prints?id=eq.${id}`, {method:"PATCH", body:JSON.stringify({approved:true})});
    loadAll();
  } catch(e) { alert('Error: ' + e.message); }
}

async function deletePost(id) {
  if (!confirm('Delete this submission?')) return;
  try {
    await sb(`hall_of_prints?id=eq.${id}`, {method:"DELETE"});
    loadAll();
  } catch(e) { alert('Error: ' + e.message); }
}
</script>
</body>
</html>
